services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nautilus
      POSTGRES_USER: nautilus
      POSTGRES_PASSWORD: nautilus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nautilus -d nautilus"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://nautilus:nautilus@postgres:5432/nautilus
      FRONTEND_ORIGIN: http://localhost:3000
      POLYMARKET_API_URL: https://gamma-api.polymarket.com
      KALSHI_API_URL: https://trading-api.kalshi.com/trade-api/v2
      THE_ODDS_API_URL: https://api.the-odds-api.com/v4
      SPORTS_TO_COLLECT: americanfootball_nfl,basketball_nba,baseball_mlb,icehockey_nhl
      SPORTSBOOK_MARKETS_TO_COLLECT: h2h,outrights
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
